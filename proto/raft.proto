syntax = "proto3";
package raftkv.raft;

// ── Log Entry ───────────────────────────────────────────────────
message LogEntry {
  bytes   command    = 1;  // Serialized KV operation
  int32   term       = 2;
  int32   index      = 3;
}

// ── AppendEntries RPC ───────────────────────────────────────────
message AppendEntriesRequest {
  int32   term           = 1;
  int32   leader_id      = 2;
  int32   prev_log_index = 3;
  int32   prev_log_term  = 4;
  repeated LogEntry entries = 5;
  int32   leader_commit  = 6;
}

message AppendEntriesReply {
  int32   term           = 1;
  bool    success        = 2;
  // Optimization: fast log backup (conflicting index/term)
  int32   conflict_index = 3;
  int32   conflict_term  = 4;
}

// ── RequestVote RPC ─────────────────────────────────────────────
message RequestVoteRequest {
  int32   term            = 1;
  int32   candidate_id    = 2;
  int32   last_log_index  = 3;
  int32   last_log_term   = 4;
}

message RequestVoteReply {
  int32   term            = 1;
  bool    vote_granted    = 2;
}

// ── InstallSnapshot RPC ─────────────────────────────────────────
message InstallSnapshotRequest {
  int32   term               = 1;
  int32   leader_id          = 2;
  int32   last_included_index = 3;
  int32   last_included_term  = 4;
  bytes   data               = 5;
}

message InstallSnapshotReply {
  int32   term = 1;
}

// ── Raft internal RPC service ───────────────────────────────────
service RaftService {
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesReply);
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteReply);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotReply);
}
