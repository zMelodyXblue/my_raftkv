syntax = "proto3";
package raftkv.kv;

// ── KV operations ───────────────────────────────────────────────
message GetRequest {
  string  key         = 1;
  string  client_id   = 2;
  int64   request_id  = 3;
}

message GetReply {
  string  value = 1;
  string  error = 2;  // "", "ErrNoKey", "ErrWrongLeader", "ErrTimeout"
}

message PutAppendRequest {
  string  key         = 1;
  string  value       = 2;
  string  op          = 3;  // "Put" or "Append"
  string  client_id   = 4;
  int64   request_id  = 5;
}

message PutAppendReply {
  string  error = 1;
}

// ── KV operation (serialized into LogEntry::command) ────────────
// Used by KvStore to serialize/deserialize the command payload
// that Raft stores in the log.
message KvOpData {
  string  op         = 1;  // "Get" | "Put" | "Append"
  string  key        = 2;
  string  value      = 3;
  string  client_id  = 4;
  int64   request_id = 5;
}

// ── Dedup entry (cached result for exactly-once semantics) ──────
// Workaround: protobuf 3.6 does not support map<string, Message>.
// Use repeated key-value pairs instead.
message DedupEntry {
  string client_id  = 1;
  int64  request_id = 2;  // last applied request_id for this client
  string value      = 3;  // cached return value (Get result; empty for Put/Append)
}

// ── KV snapshot (serialized state for log compaction) ───────────
message KvSnapshot {
  map<string, string>  data       = 1;  // key → value
  repeated DedupEntry  dedup      = 2;  // client_id → last applied entry
}

// ── KV service (client-facing) ──────────────────────────────────
service KvService {
  rpc Get(GetRequest) returns (GetReply);
  rpc PutAppend(PutAppendRequest) returns (PutAppendReply);
}
